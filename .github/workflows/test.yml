name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      # 只跑純邏輯測試;live(yfinance/ETF 抓取)不進 CI,由 Colab 驗
      - run: python -m pytest tests/ -v
